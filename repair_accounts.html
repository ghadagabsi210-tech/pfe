<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ESIP - Outil de Réparation des Comptes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; padding: 40px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h1 { color: #0f172a; margin-bottom: 20px; text-align: center; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; }
        .stat-box { background: #f8fafc; padding: 15px 25px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-box b { color: #2563eb; font-size: 20px; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; background: #0f172a; color: white; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-repair { background: #2563eb; color: white; }
        .btn-repair:hover { background: #1d4ed8; }
        .btn-all { background: #059669; color: white; padding: 15px 30px; font-size: 16px; width: 100%; margin-top: 20px; }
        #log { margin-top: 20px; background: #1e293b; color: #a1a1aa; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <h1>Réparation des Comptes ESIP</h1>
    <p style="text-align:center; color: #64748b;">Cet outil crée les identifiants de connexion manquants pour les membres importés.</p>

    <div class="stats">
        <div class="stat-box">Étudiants <b id="count-etd">0</b></div>
        <div class="stat-box">Professeurs <b id="count-prof">0</b></div>
        <div class="stat-box">Employés <b id="count-emp">0</b></div>
    </div>

    <button class="btn btn-all" id="btn-auto" onclick="startAutoMode()">🚀 Activer TOUS les comptes manquants</button>
    <div id="auto-status" style="text-align:center; margin-top:10px; font-weight:700; color:#059669; display:none;">
        Mode Automatique Activé... <span id="auto-count">0</span> / <span id="auto-total">?</span>
    </div>

    <div id="log">Initialisation...</div>

    <table>
        <thead>
            <tr>
                <th>Nom & Prénom</th>
                <th>Rôle</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="member-list">
            <!-- Members will appear here -->
        </tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD56AbWLar8R7qe4x__3a8dfZop6A1jew0",
        authDomain: "pfe2026-2cd50.firebaseapp.com",
        projectId: "pfe2026-2cd50",
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const logEl = document.getElementById('log');
    const b = (msg) => {
        const d = document.createElement('div');
        d.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.appendChild(d);
        logEl.scrollTop = logEl.scrollHeight;
    };

    let allMembers = [];

    async function loadData() {
        b("Récupération des données...");
        const etd = await db.collection("etd").get();
        const prof = await db.collection("professeur").get();
        const emp = await db.collection("employes").get();

        document.getElementById('count-etd').innerText = etd.size;
        document.getElementById('count-prof').innerText = prof.size;
        document.getElementById('count-emp').innerText = emp.size;

        allMembers = [
            ...etd.docs.map(d => ({ ...d.data(), id: d.id, coll: 'etd' })),
            ...prof.docs.map(d => ({ ...d.data(), id: d.id, coll: 'professeur' })),
            ...emp.docs.map(d => ({ ...d.data(), id: d.id, coll: 'employes' }))
        ];

        render();
        b(`Récupération terminée. ${allMembers.length} membres chargés.`);
        
        checkAutoMode();
    }

    function render() {
        const table = document.getElementById('member-list');
        table.innerHTML = "";
        allMembers.forEach(m => {
            table.innerHTML += `
                <tr>
                    <td>${m.nom} ${m.prenom}</td>
                    <td>${m.role || '-'}</td>
                    <td>${m.email}</td>
                    <td>
                        <button class="btn btn-repair" onclick="repairAccount('${m.email}', '${m.password || '123456'}')">Activer</button>
                    </td>
                </tr>
            `;
        });
    }

    async function repairAccount(email, password) {
        b(`Tentative d'activation pour: ${email}...`);
        try {
            await auth.createUserWithEmailAndPassword(email, password);
            b(`✅ Compte CRÉÉ pour ${email}`);
            await auth.signOut();
            return true;
        } catch (e) {
            if (e.code === 'auth/email-already-in-use') {
                b(`ℹ️ ${email} possède déjà un compte.`);
                return true;
            } else {
                b(`❌ Erreur pour ${email}: ${e.message}`);
                return false;
            }
        }
    }

    async function startAutoMode() {
        if (!confirm("Attention: Le navigateur va se rafraîchir plusieurs fois pour créer tous les comptes. Voulez-vous continuer ?")) return;
        localStorage.setItem('repair_queue', JSON.stringify(allMembers.map(m => ({ email: m.email, pwd: m.password }))));
        localStorage.setItem('repair_index', '0');
        localStorage.setItem('repair_total', allMembers.length.toString());
        processQueue();
    }

    async function checkAutoMode() {
        const queue = localStorage.getItem('repair_queue');
        if (queue) {
            document.getElementById('auto-status').style.display = 'block';
            document.getElementById('btn-auto').disabled = true;
            processQueue();
        }
    }

    async function processQueue() {
        const queue = JSON.parse(localStorage.getItem('repair_queue') || '[]');
        let index = parseInt(localStorage.getItem('repair_index') || '0');
        const total = parseInt(localStorage.getItem('repair_total') || '0');

        document.getElementById('auto-count').innerText = index;
        document.getElementById('auto-total').innerText = total;

        if (index < queue.length) {
            const m = queue[index];
            const success = await repairAccount(m.email, m.pwd || "12345678");
            
            localStorage.setItem('repair_index', (index + 1).toString());
            
            // On attend un peu pour que l'utilisateur voit le log
            setTimeout(() => {
                location.reload();
            }, 1000);
        } else {
            b("🎊 TOUT EST TERMINÉ !");
            localStorage.removeItem('repair_queue');
            localStorage.removeItem('repair_index');
            localStorage.removeItem('repair_total');
            document.getElementById('auto-status').innerText = "✅ Réparation terminée avec succès !";
            alert("Réparation terminée ! Tous les membres peuvent maintenant se connecter.");
        }
    }

    loadData();
</script>

</body>
</html>
