<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paramètres ESIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="darkmode.css">
    <script src="darkmode.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#f4f7fa; min-height:100vh; padding-top:100px; color: #0f172a; transition:0.4s; }
        .header { position:fixed; top:0; left:0; width:100%; height:80px; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); display:flex; justify-content:space-between; align-items:center; padding:0 60px; box-shadow:0 1px 0 rgba(0,0,0,0.05); z-index:1000; }
        .logo { font-size:26px; font-weight:800; color: #0f172a; cursor:pointer; }
        .logo span { color: #2563eb; }
        .container { width:100%; max-width:850px; margin:0 auto; padding:20px; display:grid; grid-template-columns: 1fr 1fr; gap:25px; }
        .card { background:white; padding:35px; border-radius:30px; box-shadow:0 10px 40px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); transition:0.3s; animation:fadeUp 0.8s ease; }
        .card:hover { transform:translateY(-8px); box-shadow: 0 20px 60px rgba(37,99,235,0.05); }
        .full { grid-column: span 2; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        h2 { margin-bottom:25px; color: #0f172a; font-size:22px; display:flex; align-items:center; gap:12px; font-weight: 800; }
        label { display:block; margin-top:18px; font-size:12px; font-weight:800; color:#64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width:100%; padding:14px; margin-top:8px; border-radius:14px; border:1px solid #e2e8f0; outline:none; font-family:inherit; background: #fcfcfc; transition: 0.3s; }
        input:focus { border-color: #2563eb; background: white; box-shadow:0 0 15px rgba(37,99,235,0.05); }
        button { width:100%; padding:15px; margin-top:25px; border:none; border-radius:15px; background: #2563eb; color:white; font-weight:700; cursor:pointer; transition:0.3s; box-shadow: 0 4px 15px rgba(37,99,235,0.2); }
        button:hover { background: #1d4ed8; transform:translateY(-3px); }
        .btn-logout { background:#ef4444; margin-top:10px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); width:100%; }
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background: #0f172a; color:white; padding:12px 25px; border-radius:50px; opacity:0; transition:0.4s; font-weight:600; z-index:2000; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        
        /* TABLE MINI */
        .hist-table { width:100%; border-collapse:collapse; margin-top:15px; }
        .hist-table th { text-align:left; font-size:11px; color:#64748b; padding:10px; border-bottom:2px solid #f1f5f9; text-transform:uppercase; }
        .hist-table td { padding:12px 10px; font-size:13px; border-bottom:1px solid #f8fafc; }
        .status-pill { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .present { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
        .absent { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }
        
        .profile-header { display:flex; gap:35px; align-items:center; background:var(--secondary); padding:40px; border-radius:30px; color:white; margin-bottom:25px; box-shadow:0 15px 40px rgba(15,23,42,0.15); position:relative; overflow:hidden; }
        .profile-header::after { content: ""; position:absolute; top:-50%; right:-20%; width:250px; height:250px; background:rgba(37,99,235,0.2); border-radius:50%; filter:blur(40px); }
        .profile-header img { width:120px; height:120px; border-radius:50%; border:5px solid rgba(255,255,255,0.1); object-fit:cover; position:relative; z-index:1; transition:0.3s; }
        .profile-header img:hover { transform:scale(1.05); border-color:var(--primary); }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="history.back()">ESIP</div>
        <button onclick="history.back()" style="width:auto; padding:10px 25px; margin:0; background: #0f172a;">Retour</button>
    </header>

    <div class="container">
        <!-- HEADER CARD -->
        <div class="profile-header full">
            <img id="profImg" src="https://via.placeholder.com/120" alt="Profile">
            <div style="position:relative; z-index:1;">
                <h1 id="profNameDisplay" style="font-size:28px; font-weight:800; margin-bottom:5px;">Chargement...</h1>
                <p id="pageHeaderTitle" style="color:#38bdf8; font-weight:600; font-size:15px; text-transform:uppercase; letter-spacing:1px;">Mon Profil</p>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <span style="background:rgba(255,255,255,0.1); padding:5px 12px; border-radius:8px; font-size:12px;"><i class="fa-solid fa-id-card"></i> <span id="profCinDisplay">...</span></span>
                    <span style="background:rgba(255,255,255,0.1); padding:5px 12px; border-radius:8px; font-size:12px;"><i class="fa-solid fa-phone"></i> <span id="profTelDisplay">...</span></span>
                </div>
            </div>
        </div>

        <!-- LEFT SIDE: IDENTITY & FILE -->
        <div class="card">
            <h2><i class="fa-solid fa-user-pen" style="color:#2563eb;"></i> Identité & Photo</h2>
            <label>Changer ma Photo</label>
            <div style="background:#f8fafc; padding:20px; border-radius:15px; border:1px dashed #cbd5e1; margin-top:8px; text-align:center;">
                <input type="file" id="photoFile" style="width:100%; font-size:12px;">
                <p style="font-size:11px; color:#94a3b8; margin-top:10px;">Format recommandé: Carré, max 2Mo</p>
            </div>
            
            <label>Nom</label>
            <input id="nom" placeholder="Votre nom">
            <label>Prénom</label>
            <input id="prenom" placeholder="Votre prénom">
            
            <button onclick="saveProfile()" style="margin-top:40px;"><i class="fa-solid fa-save" style="margin-right:10px;"></i> Enregistrer tout</button>
        </div>

        <!-- RIGHT SIDE: CONTACT & SECURE -->
        <div class="card">
            <h2><i class="fa-solid fa-address-book" style="color:#6366f1;"></i> Coordonnées</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div>
                    <label>CIN</label>
                    <input id="cin" placeholder="8 chiffres">
                </div>
                <div>
                    <label>Téléphone</label>
                    <input id="tel" placeholder="22 333 444">
                </div>
            </div>
            <label>Email Académique</label>
            <input id="email" placeholder="votre@email.tn">
            
            <h2 style="margin-top:40px;"><i class="fa-solid fa-key" style="color:#ef4444;"></i> Mot de passe</h2>
            <input type="password" id="pass" placeholder="••••••••">
            <button onclick="changePass()" style="background:#0f172a; margin-top:15px;">Appliquer nouveau MDP</button>
            <button class="btn-logout" id="logoutBtnSecondary" onclick="logout()" style="margin-top:20px; display:none;"><i class="fa-solid fa-power-off" style="margin-right:8px"></i> Fermer ma Session</button>
        </div>

        <!-- FULL WIDTH: RECLAMATIONS -->
        <div class="card full" id="reclamationCard">
            <h2><i class="fa-solid fa-circle-exclamation" style="color:#2563eb;"></i> Envoyez une Réclamation</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:25px; align-items:start;">
                <div>
                    <label>Objet de la réclamation</label>
                    <input id="recSujet" placeholder="Ex: Problème technique, Absence injustifiée...">
                    <label>Justificatif (Optionnel)</label>
                    <div style="background:#f8fafc; padding:15px; border-radius:12px; border:1px dashed #cbd5e1; margin-top:8px;">
                        <input type="file" id="recFile" style="width:100%; font-size:12px; border:none; padding:0;">
                    </div>
                </div>
                <div>
                    <label>Message / Détails</label>
                    <textarea id="recMessage" style="width:100%; height:110px; padding:14px; margin-top:8px; border-radius:14px; border:1px solid #e2e8f0; outline:none; font-family:inherit; resize:none;"></textarea>
                </div>
            </div>
            <button onclick="sendReclamation()" style="background:#0f172a; margin-top:20px; width:auto; padding:12px 40px;"><i class="fa-solid fa-paper-plane" style="margin-right:10px;"></i> Envoyer ma Réclamation</button>
            
            <h2 style="margin-top:40px;"><i class="fa-solid fa-clock-rotate-left" style="color:#64748b;"></i> Historique de mes demandes</h2>
            <div id="profReclamationList" style="display:flex; flex-direction:column; gap:12px; margin-top:15px;">
                <p style="font-size:13px; color:#94a3b8; text-align:center; padding:20px; background:#fcfcfc; border-radius:15px;">Aucune réclamation trouvée.</p>
            </div>
        </div>

        <!-- FULL WIDTH: LOGS -->
        <div class="card full" id="presenceCard">
            <h2><i class="fa-solid fa-calendar-check" style="color:#10b981;"></i> État de Présence (Semaine)</h2>
            <table class="hist-table">
                <thead>
                    <tr><th>Date</th><th>Séance</th><th>Module</th><th>État</th></tr>
                </thead>
                <tbody id="histBody"></tbody>
            </table>
            <button class="btn-logout" onclick="logout()" style="margin-top:35px;"><i class="fa-solid fa-power-off" style="margin-right:8px"></i> Fermer ma Session</button>
        </div>
    </div>

    <div id="toast" class="toast">Action réussie !</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, serverTimestamp, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, updateEmail, updatePassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD56AbWLar8R7qe4x__3a8dfZop6A1jew0",
            authDomain: "pfe2026-2cd50.firebaseapp.com",
            projectId: "pfe2026-2cd50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                let docSnap = await getDoc(doc(db, "professeur", user.uid));
                let collectionName = "professeur";
                
                if (!docSnap.exists()) {
                    docSnap = await getDoc(doc(db, "employes", user.uid));
                    collectionName = "employes";
                }

                if (docSnap.exists()) {
                    window.userCollection = collectionName;
                    currentUserData = docSnap.data();
                    document.getElementById("nom").value = currentUserData.nom || "";
                    document.getElementById("prenom").value = currentUserData.prenom || "";
                    document.getElementById("email").value = user.email || "";
                    document.getElementById("cin").value = currentUserData.cin || "";
                    document.getElementById("tel").value = currentUserData["numero de telephone"] || currentUserData.tel || "";
                    document.getElementById("profImg").src = currentUserData.photo || "https://via.placeholder.com/120";
                    
                    const roleLabel = collectionName === "professeur" ? "Enseignant" : "Employé";
                    document.getElementById("profNameDisplay").innerText = `${currentUserData.nom} ${currentUserData.prenom}`;
                    document.getElementById("pageHeaderTitle").innerText = roleLabel;
                    document.getElementById("profCinDisplay").innerText = currentUserData.cin || "N/A";
                    document.getElementById("profTelDisplay").innerText = currentUserData["numero de telephone"] || currentUserData.tel || "N/A";
                    
                    if (collectionName === "employes") {
                        document.getElementById("presenceCard").style.display = "none";
                        document.getElementById("logoutBtnSecondary").style.display = "block";
                    } else {
                        loadMyHistory(user.uid);
                    }
                    startReclamationListener(user.uid);
                }
            } else {
                location.href = "login.html";
            }
        });

        window.saveProfile = async () => {
            const user = auth.currentUser;
            if(!user) return;
            const newNom = document.getElementById("nom").value.trim();
            const newPrenom = document.getElementById("prenom").value.trim();
            const newEmail = document.getElementById("email").value.trim();
            const newCin = document.getElementById("cin").value.trim();
            const newTel = document.getElementById("tel").value.trim();
            const photoFile = document.getElementById("photoFile").files[0];
            const photoUrl = document.getElementById("photo").value.trim();

            let finalPhoto = photoUrl;
            if(photoFile){
                finalPhoto = await new Promise(resolve => {
                    let reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(photoFile);
                });
            }

            try {
                const updateData = {
                    nom: newNom,
                    prenom: newPrenom,
                    email: newEmail,
                    cin: newCin,
                    photo: finalPhoto
                };

                if (window.userCollection === "professeur") {
                    updateData["numero de telephone"] = newTel;
                } else {
                    updateData.tel = newTel;
                }

                await updateDoc(doc(db, window.userCollection, user.uid), updateData);
                if (newEmail !== user.email) await updateEmail(user, newEmail);
                document.getElementById("profImg").src = finalPhoto || "https://via.placeholder.com/100";
                showToast("Profil mis à jour !");
            } catch (e) { alert(e.message); }
        };

        window.changePass = async () => {
            const user = auth.currentUser;
            if(!user) return;
            const newPass = document.getElementById("pass").value.trim();
            if(newPass.length < 6) return alert("Min 6 caractères");
            try {
                await updatePassword(user, newPass);
                await updateDoc(doc(db, window.userCollection, user.uid), { password: newPass });
                showToast("Mot de passe changé !");
            } catch (e) { alert("Erreur de sécurité. Reconnectez-vous."); }
        };

        window.logout = () => signOut(auth).then(() => location.href = "login.html");

        window.sendReclamation = async () => {
            const user = auth.currentUser;
            if(!user) return;
            const sujet = document.getElementById("recSujet").value.trim();
            const message = document.getElementById("recMessage").value.trim();
            const fileInput = document.getElementById("recFile");

            if(!sujet || !message) return alert("Veuillez remplir le sujet et le message.");

            try {
                let attachment = null;
                if(fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    attachment = await new Promise(resolve => {
                        let reader = new FileReader();
                        reader.onload = () => resolve({
                            name: file.name,
                            type: file.type,
                            data: reader.result
                        });
                        reader.readAsDataURL(file);
                    });
                }

                await addDoc(collection(db, "reclamations"), {
                    senderId: user.uid,
                    senderName: `${currentUserData.nom} ${currentUserData.prenom}`,
                    senderRole: window.userCollection === "professeur" ? "prof" : "employe",
                    email: user.email,
                    sujet: sujet,
                    message: message,
                    attachment: attachment,
                    status: "En attente",
                    adminReply: "",
                    date: serverTimestamp()
                });

                document.getElementById("recSujet").value = "";
                document.getElementById("recMessage").value = "";
                fileInput.value = "";
                showToast("Réclamation envoyée !");
            } catch (e) { alert(e.message); }
        };

        function startReclamationListener(uid) {
            const q = query(collection(db, "reclamations"), where("senderId", "==", uid), orderBy("date", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById("profReclamationList");
                if(snap.empty) {
                    list.innerHTML = '<p style="font-size:13px; color:#94a3b8; text-align:center; padding:20px; background:#fcfcfc; border-radius:15px;">Aucune réclamation trouvée.</p>';
                    return;
                }

                let html = "";
                snap.forEach(doc => {
                    const r = doc.data();
                    let statusColor = "#64748b";
                    let statusBg = "#f1f5f9";
                    if(r.status === "Acceptée") { statusColor = "#10b981"; statusBg = "#d1fae5"; }
                    else if(r.status === "Refusée") { statusColor = "#ef4444"; statusBg = "#fee2e2"; }
                    else if(r.status === "Répondue") { statusColor = "#2563eb"; statusBg = "#dbeafe"; }

                    html += `
                        <div style="background:white; padding:20px; border-radius:20px; border:1px solid #e2e8f0; font-size:14px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);">
                            <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px;">
                                <strong style="font-size:15px;">${r.sujet}</strong>
                                <span class="status-pill" style="background:${statusBg}; color:${statusColor}; border:none;">${r.status}</span>
                            </div>
                            <p style="color:#64748b; line-height:1.5;">${r.message}</p>
                            ${r.adminReply ? `
                                <div style="margin-top:15px; padding:15px; background:#f0f7ff; border-radius:15px; border-left:4px solid #2563eb;">
                                    <strong style="color:#2563eb; font-size:12px; display:block; margin-bottom:5px;">Réponse Admin:</strong>
                                    <div style="color:#1e293b; font-style:italic;">${r.adminReply}</div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                list.innerHTML = html;
            });
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        function loadMyHistory(uid) {
            const histBody = document.getElementById("histBody");
            const samples = [
                { date: "07/04/2026", sess: "08:00 - 10:00", module: "Algorithmique", status: "present" },
                { date: "07/04/2026", sess: "10:00 - 12:00", module: "Algorithmique", status: "present" },
                { date: "08/04/2026", sess: "14:00 - 16:00", module: "Programmation", status: "absent" }
            ];
            histBody.innerHTML = samples.map(s => `
                <tr>
                    <td style="font-weight:600;">${s.date}</td>
                    <td>${s.sess}</td>
                    <td style="color:#64748b; font-size:12px;">${s.module}</td>
                    <td><span class="status-pill ${s.status}">${s.status === 'present' ? 'Hader' : 'Absent'}</span></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
