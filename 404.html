<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Introuvable - ESIP Gafsa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style media="screen">
      :root {
          --primary: #2563eb;
          --secondary: #0f172a;
          --light: #f8fafc;
          --border: #e2e8f0;
      }
      body { background: var(--light); color: var(--secondary); font-family: 'Poppins', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      #message { background: white; max-width: 450px; padding: 50px 40px; border-radius: 30px; box-shadow: 0 15px 50px rgba(15, 23, 42, 0.05); text-align: center; border: 1px solid var(--border); }
      #message h2 { color: var(--primary); font-weight: 800; font-size: 60px; margin: 0; }
      #message h1 { font-size: 24px; font-weight: 800; color: var(--secondary); margin: 10px 0 20px;}
      #message p { line-height: 1.6; color: #64748b; font-size: 15px; margin-bottom: 30px; }
      #message a { display: inline-block; text-align: center; background: var(--primary); text-decoration: none; color: white; padding: 14px 30px; border-radius: 12px; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
      #message a:hover { background: #1d4ed8; transform: translateY(-3px); }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>Oups ! Page introuvable</h1>
      <p>La page que vous recherchez semble avoir été déplacée ou n'existe plus.</p>
      <a href="login.html">Retour à l'accueil</a>
    </div>
  </body>
</html>
