        .err { background: #fee2e2; color: #991b1b; }
        #download-btn { display: none; background: #059669; color: white; border: none; padding: 14px 30px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 16px; }

const results = [];

async function start() {
    document.getElementById('btn-start').disabled = true;
    logEl.innerHTML = '';

    // STEP 1: Supprimer les anciens enregistrements
    log("🧹 Étape 1: Suppression des anciens enregistrements...");
    const snap = await db.collection("etd").get();
    let deleted = 0;
    for (const d of snap.docs) {
        if (d.id.startsWith("student_auto_")) {
            await db.collection("etd").doc(d.id).delete();
            deleted++;
        }
    }
    log(`✅ ${deleted} anciens enregistrements supprimés.`);

    // STEP 2: Créer les comptes Auth + Firestore
    log("🚀 Étape 2: Création des 40 comptes étudiants...");
    let i = 0;
    const tbody = document.getElementById('result-body');

    for (const s of students) {
        setProgress(i, students.length);
        // Generate auto password
        s.pwd = genPwd();
        try {
            // Create Auth account
            const cred = await auth.createUserWithEmailAndPassword(s.email, s.pwd);
            const uid = cred.user.uid;

            // Save to Firestore
            await db.collection("etd").doc(uid).set({
                nom: s.nom,
                prenom: s.prenom,
                email: s.email,
                cin: s.cin,
                tel: s.tel,
                classe: s.classe,
                role: "etudiant",
                password: s.pwd,
                photo: ""
            });

            // Sign out before creating next account
            await auth.signOut();

            results.push({ ...s, status: 'ok' });
            log(`✅ [${i+1}/40] ${s.nom} ${s.prenom} - CRÉÉ`);

            tbody.innerHTML += `
                <tr>
                    <td>${s.nom}</td><td>${s.prenom}</td><td>${s.email}</td>
                    <td>${s.classe}</td><td><code>${s.pwd}</code></td>
                    <td><span class="badge ok">✅ OK</span></td>
                </tr>`;
        } catch(err) {
            if (err.code === 'auth/email-already-in-use') {
                // Update Firestore only
                const q = await db.collection("etd").where("email", "==", s.email).get();
                if (q.empty) {
                    await db.collection("etd").add({ nom: s.nom, prenom: s.prenom, email: s.email, cin: s.cin, tel: s.tel, classe: s.classe, role: "etudiant", password: s.pwd, photo: "" });
                }
                results.push({ ...s, status: 'exists' });
                log(`ℹ️ [${i+1}/40] ${s.email} existe déjà.`);
                tbody.innerHTML += `<tr><td>${s.nom}</td><td>${s.prenom}</td><td>${s.email}</td><td>${s.classe}</td><td><code>${s.pwd}</code></td><td><span class="badge ok">ℹ️ Existant</span></td></tr>`;
            } else {
                results.push({ ...s, status: 'error', err: err.message });
                log(`❌ [${i+1}/40] Erreur ${s.email}: ${err.message}`);
                tbody.innerHTML += `<tr><td>${s.nom}</td><td>${s.prenom}</td><td>${s.email}</td><td>${s.classe}</td><td><code>${s.pwd}</code></td><td><span class="badge err">❌ Erreur</span></td></tr>`;
            }
        }
        i++;
    }

    setProgress(students.length, students.length);
    pctEl.innerText = "✅ TERMINÉ !";
    pctEl.style.color = "#059669";
    document.body.style.background = "#0f2e1a";
    log("🎊 Importation complète ! Vous pouvez télécharger la liste des mots de passe.");
    document.getElementById('result-table').style.display = 'table';
    document.getElementById('download-btn').style.display = 'block';
}

function downloadCSV() {
    let csv = "Nom,Prenom,Email,Classe,Mot de passe\n";
    results.forEach(r => {
        csv += `${r.nom},${r.prenom},${r.email},${r.classe},${r.pwd}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'esip_etudiants_passwords.csv';
    a.click();
}
