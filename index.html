<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to Firebase Hosting</title>

    <!-- update the version number as needed -->
    <script defer src="/__/firebase/12.9.0/firebase-app-compat.js"></script>
    <!-- include only the Firebase features as you need -->
    <script defer src="/__/firebase/12.9.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/12.9.0/firebase-database-compat.js"></script>
    <script defer src="/__/firebase/12.9.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
        }

        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body{ background: var(--light); color: var(--secondary); line-height: 1.6; }

        /* HEADER */
        .header {
            position: fixed; top: 0; width: 100%; height: 75px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10%; border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 800; color: var(--secondary); cursor: pointer; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: #64748b; font-weight: 600; font-size: 15px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        .btn-login {
            background: var(--primary); color: white; border: none; padding: 10px 25px;
            border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 12px rgba(37,99,235,0.2);
        }
        .btn-login:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* HERO */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.6)), url('esip.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; padding: 0 20px;
        }
        .hero h1 { font-size: 55px; font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .hero p { font-size: 20px; max-width: 800px; margin-bottom: 35px; opacity: 0.9; }

        /* FEATURES */
        .features { padding: 80px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .feature-card {
            background: white; padding: 40px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(15,23,42,0.05); text-align: center;
            transition: 0.3s; border: 1px solid var(--border);
        }
        .feature-card:hover { transform: translateY(-10px); }
        .feature-card i { font-size: 40px; color: var(--primary); margin-bottom: 20px; }
        .feature-card h3 { font-size: 22px; color: var(--secondary); margin-bottom: 15px; font-weight: 700; }
        .feature-card p { color: #64748b; font-size: 15px; }

        footer { background: var(--secondary); color: white; padding: 50px 10%; display: flex; justify-content: space-between; align-items: center; }
        .footer-logo { font-size: 22px; font-weight: 800; }
        .footer-logo span { color: var(--primary); }
    </style>
    <script defer src="/__/firebase/12.9.0/firebase-functions-compat.js"></script>
    <script defer src="/__/firebase/12.9.0/firebase-messaging-compat.js"></script>
    <script defer src="/__/firebase/12.9.0/firebase-storage-compat.js"></script>
    <script defer src="/__/firebase/12.9.0/firebase-analytics-compat.js"></script>
    <script defer src="/__/firebase/12.9.0/firebase-remote-config-compat.js"></script>
    <script defer src="/__/firebase/12.9.0/firebase-performance-compat.js"></script>
    <!-- 
      initialize the SDK after all desired features are loaded, set useEmulator to false
      to avoid connecting the SDK to running emulators.
    -->
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>

  </head>
  <body>
    <div id="message">
      <h2>Welcome</h2>
      <h1>Firebase Hosting Setup Complete</h1>
      <p>You're seeing this because you've successfully setup Firebase Hosting. Now it's time to go build something extraordinary!</p>
      <a target="_blank" href="https://firebase.google.com/docs/hosting/">Open Hosting Documentation</a>
    </div>
    <p id="load">Firebase SDK Loading&hellip;</p>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const loadEl = document.querySelector('#load');
        // // ================================================================
        // // The Firebase SDK is initialized and available here!
        //
        // firebase.auth().onAuthStateChanged(user => { });
        // firebase.database().ref('/path/to/ref').on('value', snapshot => { });
        // firebase.firestore().doc('/foo/bar').get().then(() => { });
        // firebase.functions().httpsCallable('yourFunction')().then(() => { });
        // firebase.messaging().requestPermission().then(() => { });
        // firebase.storage().ref('/path/to/ref').getDownloadURL().then(() => { });
        // firebase.analytics(); // call to activate
        // firebase.analytics().logEvent('tutorial_completed');
        // firebase.performance(); // call to activate
        //
        // // ================================================================

        try {
          let app = firebase.app();
          let features = [
            'auth', 
            'database', 
            'firestore',
            'functions',
            'messaging', 
            'storage', 
            'analytics', 
            'remoteConfig',
            'performance',
          ].filter(feature => typeof app[feature] === 'function');
          loadEl.textContent = `Firebase SDK loaded with ${features.join(', ')}`;
        } catch (e) {
          console.error(e);
          loadEl.textContent = 'Error loading the Firebase SDK, check the console.';
        }
      });
    </script>
    <div id=""google_translate_element"" style=""display:none;""></div>
  <script type=""text/javascript"">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'fr', autoDisplay: false }, 'google_translate_element');
    }
    window.addEventListener('load', function() {
      var lang = localStorage.getItem('preferred_lang') || 'fr';
      var checkTranslate = setInterval(function() {
        if (lang && lang !== 'fr') {
          var select = document.querySelector('.goog-te-combo');
          if (select) {
            select.value = lang;
            select.dispatchEvent(new Event('change'));
            clearInterval(checkTranslate);
          }
        } else {
          clearInterval(checkTranslate);
        }
      }, 500);
      setTimeout(function() { clearInterval(checkTranslate); }, 5000);
    });
  </script>
  <script type=""text/javascript"" src=""https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit""></script>
    <script src="chatbot.js"></script>
</body>
</html>
