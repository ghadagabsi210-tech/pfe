<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion du Personnel - ESIP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="darkmode.css">
<script src="darkmode.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
    :root {
        --primary: #2563eb;
        --secondary: #0f172a;
        --light: #f1f5f9;
        --accent: #334155;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins; }
    body { background: var(--light); padding: 40px; animation: fadeIn 0.8s; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    h1 { color: var(--secondary); font-size: 28px; }

    /* ACTION BAR */
    .action-bar {
        display: flex; justify-content: space-between; align-items: center;
        background: white; padding: 20px 30px; border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 30px;
        flex-wrap: wrap; gap: 15px; border: 1px solid #e2e8f0;
    }

    .btn {
        padding: 10px 20px; border: none; border-radius: 12px;
        cursor: pointer; font-weight: 600; color: white;
        transition: 0.3s; display: flex; align-items: center; gap: 8px;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    
    .btn-retour { background: var(--secondary); }
    .btn-add { background: var(--primary); }
    .btn-export { background: var(--accent); }
    .btn-import { background: #e2e8f0; color: var(--secondary); }
    .btn-edit { background: var(--accent); padding: 6px 12px; font-size: 13px; }
    .btn-delete { background: #ef4444; padding: 6px 12px; font-size: 13px; }

    .search-box {
        position: relative; width: 300px;
    }
    .search-box input {
        width: 100%; padding: 10px 15px 10px 40px; border-radius: 25px;
        border: 1px solid #e2e8f0; outline: none; transition: 0.3s;
    }
    .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(37,99,235,0.05); }
    .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }

    /* TABLE */
    .table-container {
        background: white; border-radius: 20px; overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--secondary); color: white; padding: 18px; text-align: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    td { padding: 15px 18px; border-bottom: 1px solid #f2f2f2; font-size: 14px; color: #444; transition: 0.3s; text-align: center; }
    tr:last-child td { border: none; }
    tr:hover td { background: #f8fafc; color: var(--primary); }

    .emp-photo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
    .emp-name { font-weight: 700; color: var(--secondary); }
    .emp-role { font-size: 12px; color: var(--primary); font-weight: 600; opacity: 0.8; }

    /* MODAL */
    .modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); display: none;
        justify-content: center; align-items: center; z-index: 2000;
        backdrop-filter: blur(4px);
    }
    .modal-content {
        background: white; padding: 40px; border-radius: 25px;
        width: 100%; max-width: 500px; animation: pop 0.4s;
        max-height: 90vh; overflow-y: auto;
    }
    .modal-content h3 { margin-bottom: 25px; color: var(--secondary); font-size: 22px; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .form-group { margin-bottom: 15px; }
    .span-2 { grid-column: span 2; }
    
    label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #666; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; outline: none; background: #fdfdfd; }
    input:focus { border-color: var(--primary); background: white; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pop { from { scale: 0.8; opacity: 0; } to { scale: 1; opacity: 1; } }

</style>
</head>

<body>

    <header>
        <h1><i class="fa-solid fa-briefcase" style="color:var(--primary); margin-right:10px;"></i> Gestion Personnel</h1>
        <button class="btn btn-retour" onclick="window.location.href='admin.html'"><i class="fa-solid fa-arrow-left"></i> Retour Dashboard</button>
    </header>

    <div class="action-bar">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un employé..." onkeyup="filterTable()">
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-add" onclick="openModal()"><i class="fa-solid fa-plus"></i> Ajouter Employé</button>
            <button class="btn btn-import" onclick="importExcel()"><i class="fa-solid fa-file-import"></i> Import</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 250px;">Employé</th>
                    <th>CIN</th>
                    <th>Poste & Grade</th>
                    <th>Email</th>
                    <th>Téléphone</th>
                    <th style="width: 180px;">Mot de passe</th>
                    <th style="width: 120px;">Actions</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
    </div>

    <!-- SECTION ABSENCES -->
    <div style="margin-top: 50px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; animation: fadeIn 0.8s;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:15px;">
        <h2 style="color:var(--secondary); font-size:20px; margin:0;"><i class="fa-solid fa-list-check" style="color:var(--primary); margin-right:8px;"></i> Suivi des Absences - Employés</h2>
        <input type="text" id="searchEmpAbs" placeholder="Rechercher par nom ou période..." onkeyup="filterEmpAbsences()" style="padding:10px 15px; border-radius:30px; border:1px solid #e2e8f0; outline:none; font-family:Poppins; width:280px; box-shadow:0 3px 10px rgba(0,0,0,0.02);">
    </div>

    <table style="box-shadow:none; border:1px solid #e2e8f0; background:white;">
        <thead style="background:#f8fafc;">
            <tr>
                <th style="color:var(--secondary); background:transparent; border-bottom:2px solid #e2e8f0; text-align:left;">Employé</th>
                <th style="color:var(--secondary); background:transparent; border-bottom:2px solid #e2e8f0;">Poste</th>
                <th style="color:var(--secondary); background:transparent; border-bottom:2px solid #e2e8f0; text-align:left;">Période</th>
                <th style="color:var(--secondary); background:transparent; border-bottom:2px solid #e2e8f0;">Jours Abs.</th>
                <th style="color:var(--secondary); background:transparent; border-bottom:2px solid #e2e8f0;">Statut</th>
            </tr>
        </thead>
        <tbody id="absencesList"></tbody>
    </table>
    </div>

    <!-- MODAL -->
    <div class="modal" id="formModal">
        <div class="modal-content">
            <h3 id="modalTitle">Nouvel Employé</h3>
            <div id="errorMsg" style="color:red; font-size:13px; margin-bottom:15px; display:none;"></div>
            
            <input type="hidden" id="empId">
            <div class="form-grid">
                <div class="form-group"><label>Nom</label><input id="nom" placeholder="Ex: Ben Salem"></div>
                <div class="form-group"><label>Prénom</label><input id="prenom" placeholder="Ex: Ahmed"></div>
                <div class="form-group"><label>CIN</label><input id="cin" placeholder="8 chiffres"></div>
                <div class="form-group"><label>Téléphone</label><input id="tel" placeholder="Ex: 22 333 444"></div>
                <div class="form-group"><label>Poste</label><input id="poste" placeholder="Ex: Secrétariat"></div>
                <div class="form-group"><label>Grade</label><input id="grade" placeholder="Ex: Principal"></div>
                <div class="form-group span-2"><label>Email Principal</label><input id="email" placeholder="admin@esip.tn"></div>
                <div class="form-group span-2">
                    <label>Photo (Fichier ou URL)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="file" id="photoFile" style="flex:1;">
                        <input id="photo" placeholder="URL Photo (Optionnel)" style="flex:1;">
                    </div>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-add" id="saveBtn" style="flex:1;" onclick="saveEmployee()">Enregistrer</button>
                <button class="btn" style="background:#eee; color:#333; flex:1;" onclick="closeModal()">Annuler</button>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div class="modal" id="successModal">
        <div class="modal-content" style="text-align:center;">
            <div style="width:70px; height:70px; background:#d1fae5; color:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px auto; font-size:30px;">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3>Employé Créé !</h3>
            <p style="color:#64748b; font-size:14px; margin-bottom:20px;">Le compte a été créé avec succès. Voici les identifiants :</p>
            
            <div style="background:#f8fafc; padding:20px; border-radius:15px; text-align:left; border:1px solid #e2e8f0; margin-bottom:20px;">
                <div style="margin-bottom:10px;">
                    <label style="margin:0; font-size:11px; text-transform:uppercase; letter-spacing:1px;">Email</label>
                    <div style="display:flex; justify-content:space-between; align-items:center; font-weight:700; color:var(--secondary);">
                        <span id="succEmail">---</span>
                        <i class="fa-solid fa-copy" style="cursor:pointer; color:var(--primary);" onclick="copyToClipboard(document.getElementById('succEmail').innerText)"></i>
                    </div>
                </div>
                <div>
                    <label style="margin:0; font-size:11px; text-transform:uppercase; letter-spacing:1px;">Mot de passe</label>
                    <div style="display:flex; justify-content:space-between; align-items:center; font-weight:700; color:var(--secondary);">
                        <span id="succPass" style="font-family:monospace; font-size:18px;">---</span>
                        <i class="fa-solid fa-copy" style="cursor:pointer; color:var(--primary);" onclick="copyToClipboard(document.getElementById('succPass').innerText)"></i>
                    </div>
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn" style="background:var(--primary); justify-content:center;" onclick="sendManualEmail(document.getElementById('modalTitle').innerText, document.getElementById('succEmail').innerText, document.getElementById('succPass').innerText)">
                    <i class="fa-solid fa-envelope"></i> Envoyer Manuellement
                </button>
                <button class="btn" style="background:#f1f5f9; color:var(--secondary); justify-content:center;" onclick="document.getElementById('successModal').style.display='none'">Fermer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD56AbWLar8R7qe4x__3a8dfZop6A1jew0",
            authDomain: "pfe2026-2cd50.firebaseapp.com",
            projectId: "pfe2026-2cd50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Workaround to prevent admin logout when creating new users
        const secondaryApp = initializeApp(firebaseConfig, "SecondaryApp");
        const secondaryAuth = getAuth(secondaryApp);

// --- CONFIGURATION EMAILJS ---
        const EMAILJS_PUBLIC_KEY = "89VgfdkHUrxYc1zoK"; 
        const EMAILJS_SERVICE_ID = "service_kt5zi5k"; 
        const EMAILJS_TEMPLATE_ID = "template_qrg9zr6"; 

        try {
            emailjs.init(EMAILJS_PUBLIC_KEY);
        } catch (e) { console.error("EmailJS init failed", e); }

        // --- GLOBAL EXPOSURE (PRO STYLE) ---
        window.closeModal = () => {
            formModal.style.display = "none";
            document.getElementById("saveBtn").disabled = false;
            document.getElementById("saveBtn").innerHTML = "Enregistrer";
        };

        window.openModal = (edit = false, data = {}) => {
            document.getElementById("modalTitle").innerText = edit ? "Modifier l'employé" : "Nouvel Employé";
            document.getElementById("empId").value = data.id || "";
            document.getElementById("nom").value = data.nom || "";
            document.getElementById("prenom").value = data.prenom || "";
            document.getElementById("cin").value = data.cin || "";
            document.getElementById("tel").value = data.tel || "";
            document.getElementById("poste").value = data.poste || "";
            document.getElementById("grade").value = data.grade || "";
            document.getElementById("email").value = data.email || "";
            document.getElementById("photo").value = data.photo || "";
            
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.style.display = "none";
            errorMsg.innerText = "";
            formModal.style.display = "flex";
        };

        window.saveEmployee = async () => {
            const saveBtn = document.getElementById("saveBtn");
            const errorMsg = document.getElementById("errorMsg");
            
            let id = document.getElementById("empId").value;
            const photoFile = document.getElementById("photoFile").files[0];
            const photoUrl = document.getElementById("photo").value.trim();

            const data = {
                nom: document.getElementById("nom").value.trim(),
                prenom: document.getElementById("prenom").value.trim(),
                cin: document.getElementById("cin").value.trim(),
                tel: document.getElementById("tel").value.trim(),
                poste: document.getElementById("poste").value.trim(),
                grade: document.getElementById("grade").value.trim(),
                email: document.getElementById("email").value.trim(),
            };

            if(!data.nom || !data.email || !data.poste) {
                errorMsg.innerText = "Nom, Email et Poste obligatoires";
                errorMsg.style.display = "block";
                return;
            }

            // UI Feedback: Loading
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enregistrement...';

            try {
                let finalPhoto = photoUrl;
                if(photoFile){
                    finalPhoto = await new Promise((resolve, reject) => {
                        let reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(photoFile);
                    });
                }
                data.photo = finalPhoto;

                if(id) {
                    await updateDoc(doc(db, "employes", id), data);
                    alert("✅ Employé mis à jour");
                    window.closeModal();
                } else {
                    const password = Math.floor(10000000 + Math.random() * 90000000).toString();
                    try {
                        const userCred = await createUserWithEmailAndPassword(secondaryAuth, data.email, password);
                        await signOut(secondaryAuth);

                        await sendEmailCredentials(data.nom + " " + data.prenom, data.email, password);

                        await setDoc(doc(db, "employes", userCred.user.uid), {
                            ...data,
                            role: "employe",
                            password: password,
                            createdAt: new Date()
                        });

                        // Show Success Modal
                        document.getElementById("succEmail").innerText = data.email;
                        document.getElementById("succPass").innerText = password;
                        document.getElementById("formModal").style.display = "none";
                        document.getElementById("successModal").style.display = "flex";
                    } catch (e) {
                        throw new Error("Erreur Creation Firebase: " + e.message);
                    }
                }
            } catch (e) { 
                errorMsg.innerText = e.message;
                errorMsg.style.display = "block";
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = "Enregistrer";
            }
        };

        window.editEmp = (id) => {
            let e = employees.find(x => x.id === id);
            if(e) window.openModal(true, e);
        };

        window.deleteEmp = async (id) => {
            if(confirm("Confirmer la suppression ?")) await deleteDoc(doc(db, "employes", id));
        };

        let employees = [];

        // LOAD DATA
        onSnapshot(collection(db, "employes"), (snap) => {
            const employeeList = document.getElementById("employeeList");
            if (!employeeList) return;
            employeeList.innerHTML = "";
            employees = [];
            
            snap.forEach(d => {
                let e = d.data();
                if(e.role !== "employe") return;
                e.id = d.id;
                employees.push(e);
                renderRow(e);
            });
            renderAbsencesList();
        });

        function renderRow(e) {
            const employeeList = document.getElementById("employeeList");
            const passId = `pass-${e.id}`;
            employeeList.innerHTML += `
                <tr id="row-${e.id}">
                    <td>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <img class="emp-photo" src="${e.photo || 'https://via.placeholder.com/45'}">
                            <div>
                                <div class="emp-name">${e.nom} ${e.prenom}</div>
                                <div class="emp-role">${e.poste}</div>
                            </div>
                        </div>
                    </td>
                    <td>${e.cin || '-'}</td>
                    <td>${e.poste} <br><small style="color:#888; font-weight:600;">${e.grade || '-'}</small></td>
                    <td style="font-size:13px;">${e.email}</td>
                    <td style="font-weight:700; color:var(--primary);">${e.tel || '-'}</td>
                    <td>
                        <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
                            <span id="${passId}" style="font-family:monospace; background:#fafafa; padding:5px 10px; border-radius:8px; color:var(--primary); font-size:13px; font-weight:700; min-width:100px;">********</span>
                            <div style="display:flex; gap:4px;">
                                <button class="btn" style="padding:4px 8px; background:#f1f5f9; color:#64748b; font-size:11px;" onclick="togglePass('${passId}', '${e.password}')" title="Afficher"><i class="fa-solid fa-eye"></i></button>
                                <button class="btn" style="padding:4px 8px; background:#f1f5f9; color:var(--primary); font-size:11px;" onclick="copyToClipboard('${e.password}')" title="Copier"><i class="fa-solid fa-copy"></i></button>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="display:flex; gap:5px; justify-content:center;">
                            <button class="btn btn-edit" onclick="editEmp('${e.id}')" title="Modifier"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn" style="background:#10b981; padding:6px 12px; font-size:13px;" onclick="sendManualEmail('${e.nom} ${e.prenom}', '${e.email}', '${e.password}')" title="Envoyer par Email"><i class="fa-solid fa-envelope"></i></button>
                            <button class="btn btn-delete" onclick="deleteEmp('${e.id}')" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        }

        window.togglePass = (id, pass) => {
            const el = document.getElementById(id);
            if(el.innerText === "********") {
                el.innerText = pass;
                el.style.color = "var(--secondary)";
            } else {
                el.innerText = "********";
                el.style.color = "var(--primary)";
            }
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                alert("📋 Mot de passe copié !");
            });
        };

        window.sendManualEmail = (name, email, pass) => {
            const subject = encodeURIComponent("ESIP - Vos identifiants de connexion");
            const body = encodeURIComponent(`Bonjour ${name},\n\nVoici vos identifiants pour accéder au portail ESIP Gafsa :\n\nEmail : ${email}\nMot de passe : ${pass}\n\nLien de connexion : ${window.location.origin}/login.html\n\nCordialement,\nService Administratif ESIP`);
            window.open(`mailto:${email}?subject=${subject}&body=${body}`);
        };

        async function sendEmailCredentials(name, email, password) {
            try {
                const templateParams = {
                    to_name: name,
                    to_email: email,
                    password: password,
                };
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
            } catch (err) {
                console.error("EmailJS Error:", err);
            }
        }



        window.filterTable = () => {
            const searchInput = document.getElementById("searchInput");
            let term = searchInput.value.toLowerCase();
            document.querySelectorAll("#employeeList tr").forEach(tr => {
                tr.style.display = tr.innerText.toLowerCase().includes(term) ? "" : "none";
            });
        };

        // IMPORT
        window.importExcel=()=>{
        let input=document.createElement("input")
        input.type="file"
        input.accept=".xlsx, .csv"

        input.onchange=(e)=>{
        let reader=new FileReader()

        reader.onload=async(evt)=>{
        let wb=XLSX.read(evt.target.result,{type:"array"})
        let data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])

        for(let p of data){
            let password = p.Password || Math.floor(10000000 + Math.random() * 90000000).toString();
            try {
                const userCred = await createUserWithEmailAndPassword(auth, p.Email, password);

                // Envoyer l'email
                await sendEmailCredentials((p.Nom || "") + " " + (p.Prenom || ""), p.Email, password);

                await setDoc(doc(db, "employes", userCred.user.uid), {
                    nom: p.Nom,
                    prenom: p.Prenom,
                    cin: p.CIN || "",
                    tel: p.Tel || "",
                    poste: p.Poste || "",
                    grade: p.Grade || "",
                    email: p.Email,
                    role: "employe",
                    password: password,
                    photo: ""
                });
            } catch(err) { console.error("Error creating emp:", err); }
        }

        alert("Import terminé et emails envoyés avec succès")
        }

        reader.readAsArrayBuffer(e.target.files[0])
        }

        input.click()
        }

        // === GESTION ABSENCES EMPLOYES ===
        let absencesData = [];

        onSnapshot(collection(db,"employe_presences"), snap => {
            absencesData = [];
            snap.forEach(d => {
                let abs = d.data();
                abs.id = d.id;
                absencesData.push(abs);
            });
            renderAbsencesList();
        });

        function renderAbsencesList() {
            let list = document.getElementById("absencesList");
            if(!list) return;
            list.innerHTML = "";
            
            employees.forEach(e => {
                let prenom = e.prenom || '';
                let eAbsences = absencesData.filter(a => a.empId === e.id);
                let photoHtml = e.photo ? `<img src="${e.photo}" style="width:25px;height:25px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px;">` : `<i class="fa-solid fa-briefcase" style="color:#94a3b8;margin-right:8px;"></i>`;
                
                if(eAbsences.length === 0) {
                    list.innerHTML += `
                    <tr>
                        <td style="font-weight:600; color:var(--secondary); text-align:left;">${photoHtml} ${e.nom} ${prenom}</td>
                        <td><span style="background:#f1f5f9; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:700;">${e.poste || '-'}</span></td>
                        <td style="text-align:left; font-weight:600; color:#94a3b8;">-</td>
                        <td style="font-weight:800; font-size:15px; color:#10b981;">0 <small>jrs</small></td>
                        <td><span style="background:#d1fae5; color:#10b981; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:800; text-transform:uppercase;">En Règle</span></td>
                    </tr>
                    `;
                } else {
                    eAbsences.forEach(abs => {
                        let status = "En Règle";
                        let statusColor = "#10b981"; 
                        let statusBg = "#d1fae5";
                        
                        if(abs.absences >= 5) {
                            status = "Avertissement";
                            statusColor = "#ef4444";
                            statusBg = "#fee2e2";
                        } else if(abs.absences >= 2) {
                            status = "Attention";
                            statusColor = "#f59e0b";
                            statusBg = "#fef3c7";
                        }
                        
                        list.innerHTML += `
                        <tr>
                            <td style="font-weight:600; color:var(--secondary); text-align:left;">${photoHtml} ${e.nom} ${prenom}</td>
                            <td><span style="background:#f1f5f9; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:700;">${e.poste || '-'}</span></td>
                            <td style="text-align:left; font-weight:600;">${abs.periode}</td>
                            <td style="font-weight:800; font-size:15px; ${abs.absences > 0 ? 'color:var(--secondary);' : 'color:#10b981;'}">${abs.absences} <small>jrs</small></td>
                            <td><span style="background:${statusBg}; color:${statusColor}; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:800; text-transform:uppercase;">${status}</span></td>
                        </tr>
                        `;
                    });
                }
            });
        }
        
        window.filterEmpAbsences = () => {
            let term = document.getElementById("searchEmpAbs").value.toLowerCase();
            let rows = document.querySelectorAll("#absencesList tr");
            rows.forEach(row => {
                let name = row.cells[0].innerText.toLowerCase();
                let periode = row.cells[2].innerText.toLowerCase();
                if(name.includes(term) || periode.includes(term)) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }
    </script>

    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'fr', autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
        window.addEventListener('load', function() {
            var lang = localStorage.getItem('preferred_lang') || 'fr';
            var checkTranslate = setInterval(function() {
                var select = document.querySelector('.goog-te-combo');
                if (select) {
                    select.value = lang;
                    select.dispatchEvent(new Event('change'));
                    clearInterval(checkTranslate);
                }
            }, 500);
            setTimeout(() => clearInterval(checkTranslate), 5000);
        });
    </script>
